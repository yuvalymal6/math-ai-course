<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>מפת ניווט — מתמטיקה + AI</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0a0f1e;color:#e2e8f0;min-height:100vh}
h1{text-align:center;font-size:1.6rem;padding-top:1.5rem;color:#fff}
.sub{text-align:center;font-size:.82rem;color:#94a3b8;margin-bottom:1.2rem}
.filters{display:flex;justify-content:center;gap:.5rem;margin-bottom:.6rem;flex-wrap:wrap;padding:0 1rem}
.filters button{padding:.45rem 1.1rem;border-radius:8px;border:1.5px solid #475569;background:transparent;color:#94a3b8;font-size:.78rem;font-weight:600;cursor:pointer;transition:all .15s;font-family:inherit}
.filters button.active{color:#fff}
.filters button[data-f="g10"].active{background:rgba(52,211,153,.15);border-color:#34d399;color:#6ee7b7}
.filters button[data-f="g11"].active{background:rgba(96,165,250,.15);border-color:#60a5fa;color:#93c5fd}
.filters button[data-f="g12"].active{background:rgba(244,114,182,.15);border-color:#f472b6;color:#f9a8d4}
.filters button[data-f="u3"].active{background:rgba(251,146,60,.15);border-color:#fb923c;color:#fdba74}
.filters button[data-f="u5"].active{background:rgba(34,211,238,.15);border-color:#22d3ee;color:#67e8f9}
.legend{display:flex;justify-content:center;gap:1.2rem;margin-bottom:1.5rem;font-size:.72rem;color:#94a3b8}
.legend span{display:flex;align-items:center;gap:.3rem}
.grid-wrap{max-width:1200px;margin:0 auto;padding:0 1rem 3rem}
.section{margin-bottom:2rem}
.section-title{font-size:1rem;font-weight:800;color:#fff;margin-bottom:.8rem;padding:.5rem .8rem;border-radius:10px;display:inline-block}
.section-title.u3{background:rgba(251,146,60,.12);border:1px solid rgba(251,146,60,.3);color:#fdba74}
.section-title.u5{background:rgba(34,211,238,.12);border:1px solid rgba(34,211,238,.3);color:#67e8f9}
.grade-group{margin-bottom:1.2rem}
.grade-label{font-size:.82rem;font-weight:700;margin-bottom:.5rem;padding-right:.4rem}
.grade-label.g10{color:#6ee7b7}
.grade-label.g11{color:#93c5fd}
.grade-label.g12{color:#f9a8d4}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:.6rem}
.card{border-radius:10px;padding:.65rem .85rem;font-size:.78rem;display:flex;align-items:center;gap:.6rem;cursor:default;transition:all .15s;border:1px solid #334155;background:#0f172a}
.card:hover{border-color:#475569;background:#1e293b}
.card .status{font-size:.95rem;flex-shrink:0;width:22px;text-align:center}
.card .info{flex:1;min-width:0}
.card .name{font-weight:700;color:#e2e8f0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card .path{font-family:monospace;font-size:.68rem;color:#64748b;direction:ltr;unicode-bidi:embed;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card.hub{border-color:#475569;background:#1e293b}
.card.hub .name{color:#f59e0b}
.card.leaf{border-color:#334155}
.card.leaf .name{color:#cbd5e1}
.stats-bar{display:flex;justify-content:center;gap:2rem;margin-bottom:1rem;font-size:.78rem;color:#94a3b8}
.stats-bar .stat{display:flex;align-items:center;gap:.3rem}
.stats-bar .num{font-weight:800;color:#fff;font-size:.95rem}
/* Hide filtered */
.card.hidden{display:none}
.grade-group.hidden{display:none}
.section.hidden{display:none}
</style>
</head>
<body>

<p class="sub" id="counter">טוען...</p>

<div class="filters">

  <button data-f="u5" class="active" onclick="toggle('u5')">5 יח״ל</button>
  <button data-f="g10" class="active" onclick="toggle('g10')">כיתה י׳</button>
  <button data-f="g11" class="active" onclick="toggle('g11')">כיתה יא׳</button>
  <button data-f="g12" class="active" onclick="toggle('g12')">כיתה יב׳</button>
</div>

<div class="legend">
  <span>✅ דף תרגיל קיים</span>
  <span>📁 דף Hub</span>
  <span>🔲 placeholder (אין עדיין)</span>
</div>

<div class="stats-bar">

const gradeNames = {"10":"כיתה י׳","11":"כיתה יא׳","12":"כיתה יב׳"};
const unitNames = {"3":"3 יח״ל","5":"5 יח״ל"};
const filters = {u3:true,u5:true,g10:true,g11:true,g12:true};

function toggle(f){
  filters[f]=!filters[f];
  document.querySelector(`[data-f="${f}"]`).classList.toggle("active");
  render();
}

function render(){
  const grid=document.getElementById("grid");
  grid.innerHTML="";
  let total=0,ready=0,hubs=0;

  ["3","5"].forEach(u=>{
    const uKey=`u${u}`;
    if(!filters[uKey]) return;
    const sec=document.createElement("div");
    sec.className="section";
    const secTitle=document.createElement("div");
    secTitle.className=`section-title u${u}`;
    secTitle.textContent=unitNames[u];
    sec.appendChild(secTitle);

    ["10","11","12"].forEach(g=>{
      const gKey=`g${g}`;
      if(!filters[gKey]) return;
      const items=DATA.filter(d=>d.u===u&&d.g===g);
      if(!items.length) return;
      const grp=document.createElement("div");
      grp.className="grade-group";
      const lbl=document.createElement("div");
      lbl.className=`grade-label g${g}`;
      lbl.textContent=gradeNames[g];
      grp.appendChild(lbl);
      const cards=document.createElement("div");
      cards.className="cards";
      items.forEach(d=>{
        total++;
        const isHub=d.type==="hub";
        const isPlaceholder=d.status==="placeholder";
        if(isHub) hubs++; else if(!isPlaceholder) ready++;
        const card=document.createElement("div");
        card.className=`card ${d.type}`;
        const status=document.createElement("div");
        status.className="status";
        status.textContent=isHub?"📁":isPlaceholder?"🔲":"✅";
        const info=document.createElement("div");
        info.className="info";
        const name=document.createElement("div");
        name.className="name";
        name.textContent=d.name;
        const path=document.createElement("div");
        path.className="path";
        path.textContent=d.path;
        info.appendChild(name);
        info.appendChild(path);
        card.appendChild(status);
        card.appendChild(info);
        cards.appendChild(card);
      });
      grp.appendChild(cards);
      sec.appendChild(grp);
    });
    if(sec.querySelectorAll(".card").length) grid.appendChild(sec);
  });

  document.getElementById("st-total").textContent=total;
  document.getElementById("st-ready").textContent=ready;
  document.getElementById("st-hub").textContent=hubs;
  document.getElementById("counter").textContent=`${total} נתיבים | ${ready} ✅ מוכנים | ${hubs} 📁 Hub`;
}

render();

</html>
